name: Deploy Automático

on:
  push:
    branches:
      - claude/whatsapp-connection-setup-ixtjr2

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy no servidor via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 46.225.150.104
          username: root
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          script: |
            cd /var/www/liga-urologia
            git pull origin claude/whatsapp-connection-setup-ixtjr2
            pm2 restart liga-urologia --update-env
            echo "Deploy concluído: $(date)"
