services:
  - type: web
    name: liga-urologia
    runtime: node
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: liga-db
          property: connectionString
      - key: APP_URL
        sync: false
      - key: PAGBANK_TOKEN
        sync: false
      - key: PAGBANK_BASE_URL
        value: https://api.pagseguro.com
      - key: MEGAAPI_INSTANCE
        sync: false
      - key: MEGAAPI_TOKEN
        sync: false
      - key: MEGAAPI_BASE_URL
        value: https://api.mega-api.app.br
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false

databases:
  - name: liga-db
    databaseName: liga_urologia
    user: liga_user
    plan: free
