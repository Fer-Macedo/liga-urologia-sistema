services:
  - type: web
    name: liga-urologia
    runtime: node
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /health
    disk:
      name: liga-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER
        value: "true"
      - key: PORT
        value: "3000"
      - key: SESSION_SECRET
        generateValue: true
      - key: APP_URL
        sync: false
      - key: PAGBANK_TOKEN
        sync: false
      - key: PAGBANK_BASE_URL
        value: https://api.pagseguro.com
      - key: MEGAAPI_INSTANCE
        sync: false
      - key: MEGAAPI_TOKEN
        sync: false
      - key: MEGAAPI_BASE_URL
        value: https://api.mega-api.app.br
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: ORG_NOME
        value: Liga Academica de Urologia
      - key: ORG_COR
        value: "#1a56db"
